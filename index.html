<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國音彙考 · 讀音彙整檢索</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/earlyaccess/cwtexkai.css" rel="stylesheet">
<style>
  :root{
    --paper:#efe8d8;
    --paper-deep:#e6dcc6;
    --ink:#2a241c;
    --ink-soft:#5c5142;
    --ink-faint:#8c8064;
    --seal:#a8342a;
    --seal-deep:#8a2620;
    --seal-wash:rgba(168,52,42,0.08);
    --jade:#2f5d55;
    --jade-wash:rgba(47,93,85,0.08);
    --line:#c9bd9e;
    --line-soft:#dcd2b8;
    --card:#f6f1e4;
    --font-display:'cwTeXKai','標楷體','DFKai-SB','BiauKai',serif;
    --font-body:'cwTeXKai','標楷體','DFKai-SB','BiauKai',serif;
    --font-mono:'cwTeXKai','標楷體','DFKai-SB','BiauKai',serif;
    --font-edit:'cwTeXKai','標楷體','DFKai-SB','BiauKai',serif;
    --r:2px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at top left, rgba(255,255,255,0.35), transparent 55%),
      var(--paper);
    background-attachment:fixed;
    color:var(--ink);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .wrap{max-width:1040px;margin:0 auto;padding:0 20px 80px;}

  /* ---------- header ---------- */
  header.top{
    padding:38px 0 22px;
    border-bottom:1px solid var(--line);
    display:flex;align-items:flex-end;justify-content:space-between;
    gap:20px;flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:16px;}
  .seal-mark{
    width:46px;height:46px;border:2.5px solid var(--seal);border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    color:var(--seal);font-family:var(--font-display);font-weight:900;font-size:22px;
    transform:rotate(-3deg);
    box-shadow:0 0 0 1px rgba(168,52,42,0.15) inset;
    flex-shrink:0;
  }
  h1{
    font-family:var(--font-display);font-weight:700;font-size:26px;
    margin:0;letter-spacing:.04em;line-height:1.2;
  }
  .brand-sub{font-size:12.5px;color:var(--ink-faint);letter-spacing:.08em;margin-top:3px;}
  nav.tabs{display:flex;gap:6px;}
  nav.tabs button{
    font-family:var(--font-body);font-size:14px;font-weight:600;letter-spacing:.03em;
    background:transparent;border:1px solid transparent;color:var(--ink-soft);
    padding:9px 16px;border-radius:3px;cursor:pointer;transition:.15s;
  }
  nav.tabs button.active{background:var(--ink);color:var(--paper);}
  nav.tabs button:not(.active):hover{border-color:var(--line);}

  /* ---------- search view ---------- */
  section.view{display:none;padding-top:34px;}
  section.view.active{display:block;}

  .search-row{display:flex;gap:10px;margin-bottom:8px;}
  .search-row input{
    flex:1;font-family:var(--font-display);font-size:20px;
    padding:14px 18px;border:1.5px solid var(--ink);border-radius:3px;
    background:var(--card);color:var(--ink);outline:none;
  }
  .search-row input:focus{border-color:var(--seal);box-shadow:0 0 0 3px var(--seal-wash);}
  .search-row button{
    font-family:var(--font-body);font-weight:600;font-size:14px;
    padding:0 22px;border:1.5px solid var(--ink);background:var(--ink);color:var(--paper);
    border-radius:3px;cursor:pointer;
  }
  .hint{font-size:12.5px;color:var(--ink-faint);margin-bottom:26px;}
  .idc-row{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-bottom:26px;}
  .idc-row button{
    font-family:var(--font-display);font-size:19px;width:38px;height:38px;
    border:1px solid var(--ink);background:var(--card);color:var(--ink);
    border-radius:3px;cursor:pointer;line-height:1;padding:0;transition:.12s;
  }
  .idc-row button:hover{background:var(--ink);color:var(--paper);}
  .idc-row button.active{background:var(--seal);color:#fff;border-color:var(--seal);}

  /* signature: 田字格 hero */
  .grid-hero{
    display:none;align-items:center;gap:26px;
    background:var(--card);border:1px solid var(--line);border-radius:4px;
    padding:20px 26px;margin-bottom:28px;position:relative;overflow:hidden;
  }
  .grid-hero.show{display:flex;}
  .tianzige{
    width:96px;height:96px;flex-shrink:0;position:relative;
    border:2px solid var(--ink);background:#faf6ea;
  }
  .tianzige::before,.tianzige::after{
    content:'';position:absolute;background:var(--seal-wash);
  }
  .tianzige::before{left:0;right:0;top:50%;height:1px;background:var(--line);}
  .tianzige::after{top:0;bottom:0;left:50%;width:1px;background:var(--line);}
  .tianzige span{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);font-size:56px;font-weight:500;color:var(--ink);
  }
  .grid-hero .info{font-size:18px;color:var(--ink-soft);line-height:1.7;white-space:nowrap;overflow-x:auto;}
  .stamp{
    position:absolute;right:18px;top:14px;width:52px;height:52px;border:2px solid var(--seal);
    border-radius:4px;color:var(--seal);display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);font-weight:700;font-size:12px;transform:rotate(6deg);
    opacity:.75;letter-spacing:.05em;text-align:center;line-height:1.3;
  }

  table.results{width:100%;border-collapse:collapse;font-size:16px;border:1px solid #000;}
  table.results caption{caption-side:top;text-align:left;font-size:13px;color:var(--ink-faint);margin-bottom:8px;}
  table.results thead th{
    font-family:var(--font-body);font-weight:600;font-size:14.5px;color:var(--ink-soft);
    text-align:left;padding:12px 14px;border-bottom:1.5px solid #000;
    border-right:1px solid #000;background:var(--paper-deep);white-space:nowrap;
  }
  table.results thead th:last-child{border-right:none;}
  table.results tbody td{
    padding:16px 14px;border-bottom:1px solid #000;border-right:1px solid #000;
    vertical-align:top;font-family:var(--font-mono);font-size:16px;color:var(--ink);line-height:1.75;
    white-space:pre-line;
  }
  table.results tbody td:last-child{border-right:none;}
  table.results tbody tr:hover{background:var(--jade-wash);}
  td.char-cell{font-family:var(--font-display);font-size:30px;font-weight:600;color:var(--seal-deep);}
  td.empty-val{color:var(--ink-faint);font-style:italic;font-size:14px;}
  .report-btn{
    font-family:var(--font-body);font-size:12px;font-weight:600;color:var(--jade);
    background:var(--jade-wash);border:1px solid var(--jade);padding:6px 10px;border-radius:3px;
    cursor:pointer;white-space:nowrap;
  }
  .report-btn:hover{background:var(--jade);color:var(--paper);}
  .no-result{padding:50px 10px;text-align:center;color:var(--ink-faint);font-size:14px;}
  .no-result b{display:block;font-family:var(--font-display);font-size:18px;color:var(--ink-soft);margin-bottom:6px;}

  /* ---------- admin view ---------- */
  .gate{
    max-width:360px;margin:60px auto;background:var(--card);border:1px solid var(--line);
    padding:30px;border-radius:4px;text-align:center;
  }
  .gate p{font-size:13px;color:var(--ink-soft);margin-bottom:16px;}
  .gate input{
    width:100%;padding:10px 12px;font-size:14px;border:1px solid var(--line);border-radius:3px;
    margin-bottom:12px;font-family:var(--font-body);
  }
  .gate button{
    width:100%;padding:11px;background:var(--ink);color:var(--paper);border:none;border-radius:3px;
    font-weight:600;cursor:pointer;font-family:var(--font-body);
  }
  .gate .warn{font-size:11px;color:var(--ink-faint);margin-top:14px;line-height:1.6;}

  .admin-panel{display:none;}
  .admin-panel.show{display:block;}
  .admin-toolbar{
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;
    margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--line);
  }
  .admin-toolbar h2{font-family:var(--font-display);font-size:19px;margin:0;}
  .font-picker{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-soft);}
  .font-picker select{
    font-size:13px;padding:6px 10px;border:1px solid var(--line);border-radius:3px;background:var(--card);
  }
  .admin-tabs{display:flex;gap:8px;margin-bottom:18px;}
  .admin-tabs button{
    font-size:13px;font-weight:600;padding:7px 14px;border:1px solid var(--line);background:var(--card);
    border-radius:3px;cursor:pointer;color:var(--ink-soft);
  }
  .admin-tabs button.active{background:var(--seal);color:#fff;border-color:var(--seal);}

  .add-btn{
    background:var(--seal);color:#fff;border:none;padding:9px 16px;border-radius:3px;
    font-weight:600;font-size:13px;cursor:pointer;
  }

  .entry-card{
    background:var(--card);border:1px solid var(--line);border-radius:4px;padding:18px 20px;margin-bottom:14px;
  }
  .entry-head{display:flex;align-items:center;gap:14px;margin-bottom:14px;cursor:pointer;}
  .entry-head .big-char{font-family:var(--font-display);font-size:30px;width:44px;color:var(--seal-deep);}
  .entry-head input.char-input{
    font-family:var(--font-display);font-size:24px;width:70px;text-align:center;
    border:1px solid var(--line);border-radius:3px;padding:6px 4px;background:#fff;
  }
  .entry-head .meta{flex:1;font-size:12px;color:var(--ink-faint);}
  .entry-head .caret{color:var(--ink-faint);font-size:12px;}
  .entry-body{display:none;}
  .entry-body.open{display:block;}
  .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
  @media(max-width:640px){.field-grid{grid-template-columns:1fr;}}
  .field{display:flex;flex-direction:column;gap:5px;}
  .field label{font-size:11.5px;font-weight:600;color:var(--ink-soft);letter-spacing:.02em;}
  .field textarea{
    font-family:var(--font-edit);font-size:14px;padding:8px 10px;border:1px solid var(--line);
    border-radius:3px;resize:vertical;min-height:64px;background:#fff;color:var(--ink);
  }
  .entry-actions{display:flex;gap:8px;justify-content:flex-end;}
  .btn-save{background:var(--jade);color:#fff;border:none;padding:8px 16px;border-radius:3px;font-size:13px;font-weight:600;cursor:pointer;}
  .btn-del{background:transparent;color:var(--seal);border:1px solid var(--seal);padding:8px 16px;border-radius:3px;font-size:13px;font-weight:600;cursor:pointer;}
  .save-flash{font-size:12px;color:var(--jade);margin-right:auto;align-self:center;opacity:0;transition:opacity .3s;}
  .save-flash.show{opacity:1;}

  .report-item{
    background:var(--card);border:1px solid var(--line);border-left:4px solid var(--seal);
    border-radius:3px;padding:14px 16px;margin-bottom:10px;font-size:13px;
  }
  .report-item .rmeta{font-size:11.5px;color:var(--ink-faint);margin-bottom:6px;}
  .report-item .rnote{color:var(--ink);line-height:1.6;}
  .report-item .rrow{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .report-item button{
    font-size:11.5px;background:transparent;border:1px solid var(--line);border-radius:3px;
    padding:5px 10px;cursor:pointer;color:var(--ink-soft);white-space:nowrap;
  }
  .empty-state{padding:40px 20px;text-align:center;color:var(--ink-faint);font-size:13px;}

  /* ---------- modal ---------- */
  .overlay{
    display:none;position:fixed;inset:0;background:rgba(42,36,28,0.55);
    align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .overlay.show{display:flex;}
  .modal{
    background:var(--card);border-radius:5px;padding:26px;max-width:420px;width:100%;
    border:1px solid var(--line);
  }
  .modal h3{font-family:var(--font-display);margin:0 0 6px;font-size:18px;}
  .modal p.sub{font-size:12.5px;color:var(--ink-faint);margin:0 0 16px;}
  .modal label{font-size:12px;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:5px;}
  .modal select,.modal textarea{
    width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:3px;font-size:13.5px;
    font-family:var(--font-body);margin-bottom:14px;
  }
  .modal textarea{min-height:80px;resize:vertical;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;}
  .modal-actions button{padding:9px 16px;border-radius:3px;font-size:13px;font-weight:600;cursor:pointer;}
  .modal-actions .cancel{background:transparent;border:1px solid var(--line);color:var(--ink-soft);}
  .modal-actions .confirm{background:var(--seal);border:none;color:#fff;}

  footer{margin-top:50px;padding-top:18px;border-top:1px solid var(--line);font-size:11.5px;color:var(--ink-faint);text-align:center;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<body>
<div class="wrap">

  <header class="top">
    <div class="brand">
      <div class="seal-mark">音</div>
      <div>
        <h1>國音彙考</h1>
      </div>
    </div>
    <nav class="tabs">
      <button id="tabSearchBtn" class="active">查詢</button>
      <button id="tabAppendixBtn">附錄</button>
      <button id="tabAdminBtn">後臺管理</button>
    </nav>
  </header>

  <!-- ============ 查詢 ============ -->
  <section class="view active" id="viewSearch">
    <div class="search-row">
      <input id="searchInput" type="text" placeholder="輸入單字，或注音、字詞片段進行檢索…" autocomplete="off">
      <button id="searchBtn">檢索</button>
    </div>
    <div class="idc-row" id="idcRow"></div>

    <div class="grid-hero" id="gridHero">
      <div class="tianzige"><span id="heroChar"></span></div>
      <div class="info" id="heroInfo"></div>
    </div>

    <div id="resultsWrap"></div>
  </section>

  <!-- ============ 附錄 ============ -->
  <section class="view" id="viewAppendix">
    <div class="hint" style="margin-top:0;">收錄本站五項讀音依據之版本出處，供查證與引用時參考。</div>
    <table class="results">
      <thead><tr><th>依據名稱</th><th>版本</th></tr></thead>
      <tbody>
        <tr><td class="char-cell" style="font-size:16px;">《國音新字典》</td><td>民國9年12月24日版（西元1920年）</td></tr>
        <tr><td class="char-cell" style="font-size:16px;">《國音常用字彙》</td><td>民國22年2月版（西元1933年）</td></tr>
        <tr><td class="char-cell" style="font-size:16px;">《國音標準彙編》</td><td>民國36年1月版（西元1947年）</td></tr>
        <tr><td class="char-cell" style="font-size:16px;">《一字多音審訂表（88年）》</td><td>民國88年3月31日版（西元1999年）</td></tr>
        <tr><td class="char-cell" style="font-size:16px;">《一字多音審訂表（101年）》</td><td>民國101年12月12日版（西元2012年）</td></tr>
      </tbody>
    </table>
  </section>

  <!-- ============ 後臺 ============ -->
  <section class="view" id="viewAdmin">
    <div class="gate" id="gate">
      <div class="seal-mark" style="margin:0 auto 16px;">管</div>
      <p>請輸入管理密碼以進入後臺編輯介面</p>
      <input type="password" id="gatePw" placeholder="密碼">
      <button id="gateBtn">進入後臺</button>
      <div style="margin-top:12px;"><a href="#" id="forgotPwLink" style="font-size:12.5px;color:var(--jade);text-decoration:underline;">忘記密碼？</a></div>
    </div>

    <div class="admin-panel" id="adminPanel">
      <div class="admin-toolbar">
        <h2>資料後臺</h2>
        <div class="font-picker">全站字體：標楷體（統一套用，不可另行切換）</div>
      </div>

      <div class="admin-tabs">
        <button class="active" id="subTabEntries">字條管理</button>
        <button id="subTabReports">回報信箱 <span id="reportCount"></span></button>
      </div>

      <div id="entriesTab">
        <div style="display:flex;justify-content:flex-end;margin-bottom:14px;">
          <button class="add-btn" id="addEntryBtn">＋ 新增字條</button>
        </div>
        <div id="entryList"></div>
      </div>

      <div id="reportsTab" style="display:none;">
        <div id="reportList"></div>
      </div>
    </div>
  </section>

  <footer>本站彙整五項官方依據，供交叉比對參考；如發現疑義請使用「回報」功能。</footer>
</div>

<!-- 回報 modal -->
<div class="overlay" id="reportOverlay">
  <div class="modal">
    <h3>回報疑義</h3>
    <p class="sub" id="reportSub"></p>
    <label>回報項目</label>
    <select id="reportField"></select>
    <label>說明內容</label>
    <textarea id="reportNote" placeholder="請描述您認為此欄位可能有誤之處，或提供正確資料來源出處…"></textarea>
    <div class="modal-actions">
      <button class="cancel" id="reportCancel">取消</button>
      <button class="confirm" id="reportConfirm">送出回報</button>
    </div>
  </div>
</div>

<script>
/* ---------------- EmailJS 設定 ---------------- */
const EMAILJS_SERVICE_ID = 'service_5fm321t';
const EMAILJS_TEMPLATE_ID = 'template_spt6jin';
const EMAILJS_PUBLIC_KEY = 'z7_zvXM6ExZUy7omt';
const ADMIN_PASSWORD = 'haobin06130725';
const RECOVERY_EMAIL = 'king70697069@gmail.com';
if(window.emailjs){ emailjs.init({publicKey: EMAILJS_PUBLIC_KEY}); }

const FIELDS = [
  {key:'xinzidian', label:'《國音新字典》'},
  {key:'changyong', label:'《國音常用字彙》'},
  {key:'biaozhun',  label:'《國音標準彙編》'},
  {key:'shending88',  label:'《一字多音審訂表（88年）》'},
  {key:'shending101', label:'《一字多音審訂表（101年）》'},
];
const META_FIELDS = [
  {key:'radical', label:'部首', placeholder:'如：亻'},
  {key:'strokes', label:'總筆畫數', placeholder:'如：8'},
  {key:'structure', label:'字形結構（組字式）', placeholder:'如：⿰亻列'},
];

let entries = [];
let reports = [];
let settings = {font:'sans'};
let openEntryId = null;
let currentReportChar = null;

function uid(){ return 'e' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

/* ---------------- storage layer ---------------- */
/* 優先順序：Firestore（跨裝置同步）→ Claude 內建 window.storage（僅預覽環境）→ localStorage（本機離線備援） */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBQ5stVN-e7qx1R-RXR4bdpnIBh7XGpV-w",
  authDomain: "guoyinhuikao.firebaseapp.com",
  projectId: "guoyinhuikao",
  storageBucket: "guoyinhuikao.firebasestorage.app",
  messagingSenderId: "682075437225",
  appId: "1:682075437225:web:2cc342fb2645250f2a91b8",
  measurementId: "G-1ZVJG04HED"
};
const FIRESTORE_COLLECTION = 'guoyinhuikao';

let db = null;
try{
  if(window.firebase && firebase.initializeApp){
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
  }
}catch(e){ console.error('Firebase 初始化失敗，將改用本機儲存', e); db = null; }

const hasCloudStorage = !!(window.storage && typeof window.storage.get === 'function' && typeof window.storage.set === 'function');

async function firestoreGet(key){
  if(!db) return null;
  try{
    const doc = await db.collection(FIRESTORE_COLLECTION).doc(key).get();
    if(doc.exists){
      const data = doc.data();
      if(data && typeof data.json === 'string') return data.json;
    }
    return null;
  }catch(e){ console.error('Firestore 讀取失敗，改用本機備援資料', e); return null; }
}
async function firestoreSet(key, jsonString){
  if(!db) return false;
  try{
    await db.collection(FIRESTORE_COLLECTION).doc(key).set({
      json: jsonString,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    return true;
  }catch(e){ console.error('Firestore 寫入失敗，資料僅暫存於本機', e); return false; }
}

async function storageGet(key){
  const cloudVal = await firestoreGet(key);
  if(cloudVal !== null){
    try{ localStorage.setItem(key, cloudVal); }catch(e){}
    return {key, value: cloudVal, shared:true};
  }
  if(hasCloudStorage){
    try{
      const r = await window.storage.get(key, true);
      if(r) return r;
    }catch(e){}
  }
  try{
    const raw = localStorage.getItem(key);
    return raw !== null ? {key, value: raw, shared:true} : null;
  }catch(e){ return null; }
}
async function storageSet(key, value){
  const cloudOk = await firestoreSet(key, value);
  if(hasCloudStorage){
    try{ await window.storage.set(key, value, true); }catch(e){}
  }
  try{ localStorage.setItem(key, value); }catch(e){}
  return cloudOk;
}

async function loadAll(){
  try{
    const r = await storageGet('dict-entries');
    entries = r ? JSON.parse(r.value) : null;
  }catch(e){ entries = null; }
  if(!entries){
    entries = [{
      id: uid(), char:'例',
      radical:'亻', strokes:'8', structure:'⿰亻列',
      xinzidian:'ㄌㄧˋ（示範資料，請於後臺替換為正式內容）',
      changyong:'ㄌㄧˋ（示範資料）',
      biaozhun:'',
      shending88:'ㄌㄧˋ（示範資料）',
      shending101:'ㄌㄧˋ（示範資料，審音略有調整）',
    }];
    await saveEntries();
  }

  try{
    const r = await storageGet('dict-reports');
    reports = r ? JSON.parse(r.value) : [];
  }catch(e){ reports = []; }

}

async function saveEntries(){
  await storageSet('dict-entries', JSON.stringify(entries));
}
async function saveReports(){
  await storageSet('dict-reports', JSON.stringify(reports));
}
/* ---------------- tabs ---------------- */
const tabSearchBtn = document.getElementById('tabSearchBtn');
const tabAppendixBtn = document.getElementById('tabAppendixBtn');
const tabAdminBtn = document.getElementById('tabAdminBtn');
const viewSearch = document.getElementById('viewSearch');
const viewAppendix = document.getElementById('viewAppendix');
const viewAdmin = document.getElementById('viewAdmin');
tabSearchBtn.onclick = () => switchTab('search');
tabAppendixBtn.onclick = () => switchTab('appendix');
tabAdminBtn.onclick = () => switchTab('admin');
function switchTab(which){
  tabSearchBtn.classList.toggle('active', which==='search');
  tabAppendixBtn.classList.toggle('active', which==='appendix');
  tabAdminBtn.classList.toggle('active', which==='admin');
  viewSearch.classList.toggle('active', which==='search');
  viewAppendix.classList.toggle('active', which==='appendix');
  viewAdmin.classList.toggle('active', which==='admin');
}

/* ---------------- search ---------------- */
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const resultsWrap = document.getElementById('resultsWrap');
const gridHero = document.getElementById('gridHero');
const heroChar = document.getElementById('heroChar');
const heroInfo = document.getElementById('heroInfo');

searchBtn.onclick = runSearch;
searchInput.addEventListener('keydown', e => { if(e.key==='Enter') runSearch(); });
searchInput.addEventListener('input', () => { if(searchInput.value.trim()==='') runSearch(); });

const IDC_CHARS = ['⿰','⿱','⿲','⿳','⿴','⿵','⿶','⿷','⿸','⿹','⿺','⿻','⿼','⿽','⿾','⿿'];
const idcRow = document.getElementById('idcRow');
idcRow.innerHTML = IDC_CHARS.map(c => `<button type="button" data-idc="${c}" title="點擊插入組字式符號，接著輸入部件即可查詢，如：${c}亻列">${c}</button>`).join('');
idcRow.querySelectorAll('button').forEach(btn => {
  btn.onclick = () => {
    const idc = btn.dataset.idc;
    const start = searchInput.selectionStart ?? searchInput.value.length;
    const end = searchInput.selectionEnd ?? searchInput.value.length;
    const val = searchInput.value;
    searchInput.value = val.slice(0, start) + idc + val.slice(end);
    const pos = start + idc.length;
    searchInput.focus();
    searchInput.setSelectionRange(pos, pos);
  };
});

function runSearch(){
  const q = searchInput.value.trim();
  if(!q){
    gridHero.classList.remove('show');
    resultsWrap.innerHTML = `<div class="no-result"></div>`;
    return;
  }
  const isSingleChar = [...q].length === 1;
  const matches = entries.filter(e => {
    if(isSingleChar){
      // 單一字元查詢：僅精準比對字形本身，避免因該字出現在
      // 其他字的部首／字形結構／讀音欄位中而被誤列出（如查「八」不應連帶查到「扒」「叭」）
      return e.char === q;
    }
    if(e.char.includes(q)) return true;
    if((e.structure||'').includes(q)) return true;
    if((e.radical||'').includes(q)) return true;
    return FIELDS.some(f => (e[f.key]||'').includes(q));
  });

  if(matches.length === 1 && matches[0].char === q){
    const m = matches[0];
    gridHero.classList.add('show');
    heroChar.textContent = m.char;
    const radical = m.radical ? m.radical : '（未填寫）';
    const strokes = m.strokes ? m.strokes + ' 畫' : '（未填寫）';
    const structure = m.structure ? m.structure : '（未填寫）';
    heroInfo.innerHTML = `部首：${escapeHtml(radical)}。總筆畫：${escapeHtml(strokes)}。字形結構：${escapeHtml(structure)}。`;
  } else {
    gridHero.classList.remove('show');
  }

  if(matches.length === 0){
    resultsWrap.innerHTML = `<div class="no-result"><b>查無符合資料</b>尚未收錄「${escapeHtml(q)}」，或可透過後臺新增字條。</div>`;
    return;
  }
  renderTable(matches);
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderTable(list){
  let html = `<table class="results"><thead><tr>
    <th>字</th>
    ${FIELDS.map(f=>`<th>${f.label}</th>`).join('')}
    <th>回報</th>
  </tr></thead><tbody>`;
  list.forEach(e => {
    html += `<tr>
      <td class="char-cell">${escapeHtml(e.char)}</td>
      ${FIELDS.map(f=>{
        const v = (e[f.key]||'').trim();
        return `<td>${v ? escapeHtml(v) : '<span class="empty-val">未收錄</span>'}</td>`;
      }).join('')}
      <td><button class="report-btn" data-char="${escapeHtml(e.char)}">回報疑義</button></td>
    </tr>`;
  });
  html += '</tbody></table>';
  resultsWrap.innerHTML = html;
  resultsWrap.querySelectorAll('.report-btn').forEach(btn=>{
    btn.onclick = () => openReportModal(btn.dataset.char);
  });
}

/* ---------------- report modal ---------------- */
const reportOverlay = document.getElementById('reportOverlay');
const reportSub = document.getElementById('reportSub');
const reportField = document.getElementById('reportField');
const reportNote = document.getElementById('reportNote');

function openReportModal(char){
  currentReportChar = char;
  reportSub.textContent = `針對「${char}」字之收錄內容提出回報`;
  reportField.innerHTML = FIELDS.map(f=>`<option value="${f.key}">${f.label}</option>`).join('') + `<option value="other">其他（字形本身等）</option>`;
  reportNote.value = '';
  reportOverlay.classList.add('show');
}
document.getElementById('reportCancel').onclick = () => reportOverlay.classList.remove('show');
document.getElementById('reportConfirm').onclick = async () => {
  const note = reportNote.value.trim();
  if(!note){ reportNote.focus(); return; }
  reports.unshift({
    id: uid(), char: currentReportChar, field: reportField.value,
    fieldLabel: reportField.options[reportField.selectedIndex].textContent,
    note, time: new Date().toISOString(), resolved:false
  });
  await saveReports();
  renderReportCount();
  reportOverlay.classList.remove('show');
  reportSub.textContent = '';
  alert('已送出回報，感謝您協助校訂。');
};

/* ---------------- admin gate ---------------- */
document.getElementById('gateBtn').onclick = enterGate;
document.getElementById('gatePw').addEventListener('keydown', e => { if(e.key==='Enter') enterGate(); });
document.getElementById('forgotPwLink').onclick = (ev) => {
  ev.preventDefault();
  const link = ev.target;
  if(!window.emailjs){
    alert('寄送功能載入失敗，請確認網路連線後重新整理頁面再試一次。');
    return;
  }
  const originalText = link.textContent;
  link.textContent = '寄送中…';
  emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
    to_email: RECOVERY_EMAIL,
    email: RECOVERY_EMAIL,
    reply_to: RECOVERY_EMAIL,
    password: ADMIN_PASSWORD,
    message: `您好，您的「國音彙考」後臺管理密碼為：${ADMIN_PASSWORD}`
  }).then(() => {
    alert('已寄送，請到信箱查看');
  }).catch((err) => {
    console.error('EmailJS 寄送失敗', err);
    alert('寄送失敗，請稍後再試，或確認 EmailJS 服務設定是否正確。');
  }).finally(() => {
    link.textContent = originalText;
  });
};
function enterGate(){
  const pw = document.getElementById('gatePw').value;
  if(pw === ADMIN_PASSWORD){
    document.getElementById('gate').style.display = 'none';
    document.getElementById('adminPanel').classList.add('show');
    renderEntryList();
    renderReportCount();
  } else {
    document.getElementById('gatePw').style.borderColor = 'var(--seal)';
    document.getElementById('gatePw').value = '';
    document.getElementById('gatePw').placeholder = '密碼錯誤，請再試一次';
  }
}

/* ---------------- admin sub-tabs ---------------- */
document.getElementById('subTabEntries').onclick = () => switchAdminTab('entries');
document.getElementById('subTabReports').onclick = () => switchAdminTab('reports');
function switchAdminTab(which){
  document.getElementById('subTabEntries').classList.toggle('active', which==='entries');
  document.getElementById('subTabReports').classList.toggle('active', which==='reports');
  document.getElementById('entriesTab').style.display = which==='entries' ? 'block':'none';
  document.getElementById('reportsTab').style.display = which==='reports' ? 'block':'none';
  if(which==='reports') renderReportList();
}

/* ---------------- entry list (admin) ---------------- */
const entryList = document.getElementById('entryList');
document.getElementById('addEntryBtn').onclick = () => {
  const e = {id: uid(), char:'', radical:'', strokes:'', structure:'', xinzidian:'', changyong:'', biaozhun:'', shending88:'', shending101:''};
  entries.unshift(e);
  openEntryId = e.id;
  renderEntryList();
};

function renderEntryList(){
  if(entries.length === 0){
    entryList.innerHTML = `<div class="empty-state">尚無字條，點選「＋ 新增字條」開始建立資料。</div>`;
    return;
  }
  entryList.innerHTML = entries.map(e => entryCardHtml(e)).join('');
  entries.forEach(e => {
    const head = document.getElementById('head-'+e.id);
    head.onclick = (ev) => {
      if(ev.target.tagName === 'INPUT') return;
      openEntryId = (openEntryId === e.id) ? null : e.id;
      renderEntryList();
    };
    const charInput = document.getElementById('charinput-'+e.id);
    if(charInput) charInput.oninput = () => { e.char = charInput.value; document.getElementById('bigchar-'+e.id).textContent = e.char || '？'; };

    if(openEntryId === e.id){
      META_FIELDS.forEach(f=>{
        const ta = document.getElementById('meta-'+f.key+'-'+e.id);
        if(ta) ta.oninput = () => { e[f.key] = ta.value; };
      });
      FIELDS.forEach(f=>{
        const ta = document.getElementById('field-'+f.key+'-'+e.id);
        if(ta) ta.oninput = () => { e[f.key] = ta.value; };
      });
      const saveBtn = document.getElementById('save-'+e.id);
      if(saveBtn) saveBtn.onclick = async () => {
        await saveEntries();
        const flash = document.getElementById('flash-'+e.id);
        flash.classList.add('show');
        setTimeout(()=>flash.classList.remove('show'), 1600);
        if(searchInput.value.trim()) runSearch();
      };
      const delBtn = document.getElementById('del-'+e.id);
      if(delBtn) delBtn.onclick = async () => {
        if(!confirm(`確定刪除「${e.char||'（未命名）'}」這筆字條？此動作無法復原。`)) return;
        entries = entries.filter(x => x.id !== e.id);
        await saveEntries();
        openEntryId = null;
        renderEntryList();
        if(searchInput.value.trim()) runSearch();
      };
    }
  });
}

function entryCardHtml(e){
  const open = openEntryId === e.id;
  return `<div class="entry-card">
    <div class="entry-head" id="head-${e.id}">
      <div class="big-char" id="bigchar-${e.id}">${escapeHtml(e.char)||'？'}</div>
      <input class="char-input" id="charinput-${e.id}" maxlength="4" value="${escapeHtml(e.char)}" placeholder="字">
      <div class="meta">${e.char ? '已建檔' : '尚未輸入字形'} · 點擊展開編輯部首、筆畫、字形結構與五項依據內容</div>
      <div class="caret">${open ? '收合 ▲' : '展開 ▼'}</div>
    </div>
    <div class="entry-body ${open?'open':''}">
      <div class="field-grid" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:18px;">
        ${META_FIELDS.map(f=>`
          <div class="field">
            <label>${f.label}</label>
            <textarea id="meta-${f.key}-${e.id}" style="min-height:38px;" placeholder="${f.placeholder}">${escapeHtml(e[f.key]||'')}</textarea>
          </div>`).join('')}
      </div>
      <div class="field-grid">
        ${FIELDS.map(f=>`
          <div class="field">
            <label>${f.label}</label>
            <textarea id="field-${f.key}-${e.id}" placeholder="輸入讀音；若同一版本收錄多個讀音，請每行輸入一個，如：&#10;ㄒㄩㄝˊ&#10;ㄒㄩㄝˋ&#10;無收錄可留空">${escapeHtml(e[f.key]||'')}</textarea>
          </div>`).join('')}
      </div>
      <div class="entry-actions">
        <span class="save-flash" id="flash-${e.id}">已即時更新，前臺查詢已同步 ✓</span>
        <button class="btn-del" id="del-${e.id}">刪除字條</button>
        <button class="btn-save" id="save-${e.id}">儲存並更新前臺</button>
      </div>
    </div>
  </div>`;
}

/* ---------------- reports (admin) ---------------- */
function renderReportCount(){
  const n = reports.filter(r=>!r.resolved).length;
  document.getElementById('reportCount').textContent = n>0 ? `(${n})` : '';
}
function renderReportList(){
  const list = document.getElementById('reportList');
  if(reports.length === 0){
    list.innerHTML = `<div class="empty-state">目前尚無使用者回報。</div>`;
    return;
  }
  list.innerHTML = reports.map(r => `
    <div class="report-item" style="${r.resolved?'opacity:.5;':''}">
      <div class="rrow">
        <div>
          <div class="rmeta">「${escapeHtml(r.char)}」・${escapeHtml(r.fieldLabel||'')} ・ ${new Date(r.time).toLocaleString('zh-TW')}</div>
          <div class="rnote">${escapeHtml(r.note)}</div>
        </div>
        <button data-id="${r.id}" class="toggle-resolve">${r.resolved?'標記未處理':'標記已處理'}</button>
      </div>
    </div>`).join('');
  list.querySelectorAll('.toggle-resolve').forEach(btn=>{
    btn.onclick = async () => {
      const r = reports.find(x=>x.id===btn.dataset.id);
      r.resolved = !r.resolved;
      await saveReports();
      renderReportCount();
      renderReportList();
    };
  });
}

/* ---------------- init ---------------- */
(async function init(){
  resultsWrap.innerHTML = `<div class="no-result"></div>`;
  await loadAll();
})();
</script>
